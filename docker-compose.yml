version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cgc-postgres
    environment:
      POSTGRES_USER: cgc_user
      POSTGRES_PASSWORD: cgc_password
      POSTGRES_DB: cgc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cgc_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cgc-pgvector
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: cgc_user
      POSTGRES_PASSWORD: cgc_password
      POSTGRES_DB: cgc_db
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cgc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cgc-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cgc_user:cgc_password@postgres:5432/cgc_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  pgvector_data:
  redis_data:

networks:
  default:
    name: cgc-network
