<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compliance Guardian Copilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-slate-800 bg-slate-50">
<div class="flex min-h-screen">
  <aside class="w-64 bg-slate-900 text-slate-200 flex flex-col">
    <div class="px-6 py-5 border-b border-slate-700">
      <div class="flex gap-2"><div class="h-9 w-9 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold">CG</div>
        <div><div class="font-semibold">Compliance</div><div class="text-xs text-slate-400">Guardian</div></div></div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <button onclick="showPage('dashboard')" class="w-full text-left px-3 py-2 rounded-lg bg-blue-600 text-white text-sm">Dashboard</button>
      <button onclick="showPage('upload')" class="w-full text-left px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-800 text-sm">Upload & Analyze</button>
      <button onclick="showPage('contracts')" class="w-full text-left px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-800 text-sm">Documents</button>
    </nav>
  </aside>
  <main class="flex-1 flex flex-col">
    <header class="bg-white border-b border-slate-200 px-8 py-4">
      <h1 class="text-lg font-semibold" id="title">Dashboard</h1>
      <p class="text-sm text-slate-500">Compliance overview</p>
    </header>
    <div class="px-8 py-6 flex-1 overflow-auto" id="content">Loading...</div>
  </main>
</div>
<script>
async function showPage(p){
  const c=document.getElementById('content');
  if(p==='dashboard'){
    document.getElementById('title').textContent='Dashboard';
    const r=await fetch('/api/contracts/');
    const d=await r.json();
    c.innerHTML='<div class="grid gap-6"><div class="bg-white rounded-xl border p-6"><h2 class="font-semibold mb-4">Recent Contracts ('+(d.length||0)+')</h2>'+(d.length===0?'<p class="text-slate-500">No contracts uploaded yet</p>':d.map(x=>'<div class="py-2 border-b"><div class="font-medium text-blue-600">'+x.file_name+'</div><span class="text-xs px-2 py-1 rounded-full bg-orange-100">'+x.highest_risk_level+'</span></div>').join(''))+'</div></div>';
  }else if(p==='upload'){
    document.getElementById('title').textContent='Upload & Analyze';
    c.innerHTML='<div class="bg-white rounded-xl border p-6 max-w-2xl"><form id="uf"><input type="file" id="fi" name="document" accept=".pdf,.docx,.txt" style="display:none"><div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-600 transition" onclick="document.getElementById(\'fi\').click()"><div class="text-3xl mb-2">File</div><p class="font-medium">Drag or click to upload</p><p class="text-sm text-slate-400">PDF, DOCX, TXT</p></div><div class="grid grid-cols-2 gap-4 mt-4"><input type="text" name="business_owner" placeholder="Owner" class="rounded-lg border px-3 py-2 text-sm"><input type="text" name="department" placeholder="Dept" class="rounded-lg border px-3 py-2 text-sm"></div><button type="submit" class="w-full mt-4 rounded-lg bg-blue-600 text-white py-2.5 text-sm font-medium">Analyze Document</button></form></div>';
    document.getElementById('uf').onsubmit=async(e)=>{e.preventDefault();const fd=new FormData(e.target);const r=await fetch('/api/contracts/upload',{method:'POST',body:fd});if(r.ok){showPage('contracts');}else{alert('Upload failed');}};
  }else if(p==='contracts'){
    document.getElementById('title').textContent='Documents';
    const r=await fetch('/api/contracts/');
    const d=await r.json();
    c.innerHTML='<div class="bg-white rounded-xl border"><table class="w-full text-sm"><thead class="border-b"><tr><th class="px-6 py-3 text-left font-medium">Document</th><th class="px-6 py-3 font-medium">Owner</th><th class="px-6 py-3 font-medium">Risk</th></tr></thead><tbody>'+(d.length===0?'<tr><td colspan="3" class="px-6 py-8 text-center text-slate-500">No documents yet</td></tr>':d.map(x=>'<tr class="border-b hover:bg-slate-50"><td class="px-6 py-3 text-blue-600 font-medium">'+x.file_name+'</td><td class="px-6 py-3">'+x.business_owner+'</td><td class="px-6 py-3"><span class="px-2 py-1 text-xs rounded-full bg-orange-100">'+x.highest_risk_level+'</span></td></tr>').join(''))+'</tbody></table></div>';
  }
}
showPage('dashboard');
</script>
</body>
</html>
